<header class="h-[60px] border-b border-slate-200/60 flex items-center justify-between px-8 bg-white/70 backdrop-blur-lg sticky top-0 z-30">
    <div class="flex items-center gap-3">
        <!-- Navegación -->
        <nav class="flex items-center gap-2 text-sm">
            <span class="text-slate-400 font-medium text-[12px]">Administración</span>
            <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i>
            <span class="font-heading font-semibold text-slate-800 text-[13px]">{% block page_title %}Vista general{% endblock %}</span>
        </nav>
    </div>

    <!-- Indicadores de estado -->
    <div class="flex items-center gap-3">
        <!-- Fecha actual -->
        <span class="hidden md:inline text-[11px] text-slate-400 font-medium">
            <script>
                document.write(new Date().toLocaleDateString('es-PE', {weekday:'long', year:'numeric', month:'long', day:'numeric'}));
            </script>
        </span>
        
        <div class="w-px h-5 bg-slate-200"></div>
        
        <!-- Badge de estado del sistema -->
        <div class="flex items-center gap-2 text-[11px] px-3 py-1.5 rounded-full font-semibold
                    bg-emerald-50 text-emerald-700 border border-emerald-200/60">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-60"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            Plataforma Activa
        </div>
    </div>
</header>
