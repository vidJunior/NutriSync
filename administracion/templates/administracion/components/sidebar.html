<aside class="w-[260px] admin-sidebar flex flex-col justify-between flex-shrink-0 h-screen sticky top-0 border-r border-slate-800/50">
    <div>
        <!-- Logo con gradiente acorde al landing -->
        <div class="px-5 py-5 border-b border-white/5 flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl gradient-badge flex items-center justify-center shadow-lg shadow-teal-600/20">
                <i data-lucide="shield-check" class="w-[18px] h-[18px] text-white"></i>
            </div>
            <div>
                <span class="font-heading font-bold text-[15px] text-white tracking-tight block leading-tight">NutriSync</span>
                <span class="text-[9px] font-semibold text-teal-400 uppercase tracking-[0.15em]">Administración</span>
            </div>
        </div>

        <!-- Secciones de Navegación -->
        <nav class="px-3 pt-5 pb-3 space-y-6">
            
            <!-- Principal -->
            <div>
                <p class="px-3 mb-2 text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">Principal</p>
                <div class="space-y-0.5">
                    <a href="{% url 'administracion:dashboard' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'dashboard' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="layout-dashboard" class="w-[16px] h-[16px]"></i>
                        Vista general
                    </a>

                    <a href="{% url 'administracion:usuarios_lista' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'usuarios_lista' or request.resolver_match.url_name == 'usuario_detalle' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="users" class="w-[16px] h-[16px]"></i>
                        Nutricionistas
                    </a>

                    <a href="{% url 'administracion:reportes' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'reportes' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="bar-chart-2" class="w-[16px] h-[16px]"></i>
                        Reportes
                    </a>
                </div>
            </div>

            <!-- Facturación -->
            <div>
                <p class="px-3 mb-2 text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">Facturación</p>
                <div class="space-y-0.5">
                    <a href="{% url 'administracion:suscripciones_lista' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'suscripciones_lista' or request.resolver_match.url_name == 'suscripcion_detalle' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="credit-card" class="w-[16px] h-[16px]"></i>
                        Suscripciones
                    </a>

                    <a href="{% url 'administracion:pagos_verificar_lista' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'pagos_verificar_lista' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="receipt" class="w-[16px] h-[16px]"></i>
                        Verificar Pagos
                    </a>

                    <a href="{% url 'administracion:planes_lista' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'planes_lista' or request.resolver_match.url_name == 'plan_crear' or request.resolver_match.url_name == 'plan_editar' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="gem" class="w-[16px] h-[16px]"></i>
                        Planes
                    </a>
                </div>
            </div>

            <!-- Sistema -->
            <div>
                <p class="px-3 mb-2 text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">Sistema</p>
                <div class="space-y-0.5">
                    <a href="{% url 'administracion:notificaciones_crear' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'notificaciones_crear' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="megaphone" class="w-[16px] h-[16px]"></i>
                        Enviar Alertas
                    </a>

                    <a href="{% url 'administracion:logs_lista' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'logs_lista' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="file-clock" class="w-[16px] h-[16px]"></i>
                        Auditoría
                    </a>

                    <a href="{% url 'administracion:soporte_lista' %}"
                       class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-[13px] font-medium rounded-lg
                              {% if request.resolver_match.url_name == 'soporte_lista' or request.resolver_match.url_name == 'soporte_responder' %}nav-link-active{% else %}text-slate-400 hover:text-white{% endif %}">
                        <i data-lucide="life-buoy" class="w-[16px] h-[16px]"></i>
                        Soporte Técnico
                    </a>
                </div>
            </div>

        </nav>
    </div>

    <!-- Perfil del Admin -->
    <div class="p-3 border-t border-white/5 bg-slate-950/30">
        <div class="flex items-center justify-between gap-2">
            <div class="flex items-center gap-2.5 min-w-0">
                <div class="w-9 h-9 rounded-xl gradient-badge flex items-center justify-center text-[11px] font-bold text-white uppercase shadow-md">
                    {{ admin_perfil.nombre_completo|slice:":2" }}
                </div>
                <div class="min-w-0">
                    <p class="text-[12px] font-semibold text-white truncate leading-tight">{{ admin_perfil.nombre_completo }}</p>
                    <p class="text-[10px] text-teal-400 font-semibold tracking-wide uppercase">Operador</p>
                </div>
            </div>
            <a href="{% url 'administracion:logout' %}"
               class="p-2 rounded-xl text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 transition-all duration-200"
               title="Cerrar sesión">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </a>
        </div>
    </div>
</aside>
