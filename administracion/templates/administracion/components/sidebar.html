<!-- administracion/templates/administracion/components/sidebar.html -->
<aside class="w-64 bg-slate-950 border-r border-white/5 flex flex-col justify-between flex-shrink-0 h-screen sticky top-0">
    <div>
        <!-- Logo -->
        <div class="px-6 py-5 border-b border-white/5 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center">
                <svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                </svg>
            </div>
            <span class="font-semibold text-white tracking-tight">NutriSync Admin</span>
        </div>

        <!-- Menú de Navegación -->
        <nav class="px-3 py-4 space-y-1">
            <a href="{% url 'administracion:dashboard' %}"
               class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors group
                      {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-600 text-white{% else %}text-slate-400 hover:text-white hover:bg-white/5{% endif %}">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                Vista general
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-400 hover:text-white hover:bg-white/5">
                <i data-lucide="users" class="w-4 h-4"></i>
                Nutricionistas
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-400 hover:text-white hover:bg-white/5">
                <i data-lucide="credit-card" class="w-4 h-4"></i>
                Suscripciones
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-400 hover:text-white hover:bg-white/5">
                <i data-lucide="line-chart" class="w-4 h-4"></i>
                Finanzas
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-400 hover:text-white hover:bg-white/5">
                <i data-lucide="package" class="w-4 h-4"></i>
                Planes
            </a>

            <a href="#"
               class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors group text-slate-400 hover:text-white hover:bg-white/5">
                <i data-lucide="settings" class="w-4 h-4"></i>
                Configuración
            </a>
        </nav>
    </div>

    <!-- Perfil del Admin en la parte inferior -->
    <div class="p-3 border-t border-white/5 bg-slate-950/40">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2.5 min-w-0">
                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-xs font-semibold text-slate-200 uppercase ring-1 ring-white/10">
                    {{ admin_perfil.nombre_completo|slice:":2" }}
                </div>
                <div class="min-w-0">
                    <p class="text-xs font-medium text-white truncate">{{ admin_perfil.nombre_completo }}</p>
                    <p class="text-[10px] text-indigo-400 font-medium tracking-wide uppercase">Admin</p>
                </div>
            </div>
            <a href="{% url 'administracion:logout' %}"
               class="p-1.5 rounded-lg text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-colors"
               title="Cerrar sesión">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </a>
        </div>
    </div>
</aside>
