<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — NutriSync Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        admin: {
                            bg:      '#0a0a0f',
                            card:    '#111117',
                            border:  'rgba(255,255,255,0.08)',
                            brand:   '#6366f1',
                            'brand-hover': '#4f46e5',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0f; font-family: 'Inter', sans-serif; }
        .card-border { border: 1px solid rgba(255,255,255,0.08); }
        input:-webkit-autofill,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #1a1a24 inset !important;
            -webkit-text-fill-color: #f0f0f5 !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md">

        <!-- Logo / Marca -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-500/10 border border-indigo-500/20 mb-4">
                <svg class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-semibold text-white tracking-tight">NutriSync Admin</h1>
            <p class="text-sm text-slate-400 mt-1">Panel de administración de la plataforma</p>
        </div>

        <!-- Card -->
        <div class="card-border rounded-2xl p-8" style="background-color: #111117;">

            <h2 class="text-lg font-semibold text-white mb-6">Iniciar sesión</h2>

            <!-- Mensajes de error/éxito de Django -->
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
                        {% if message.tags == 'error' %}
                            bg-red-500/10 border border-red-500/20 text-red-400
                        {% elif message.tags == 'success' %}
                            bg-green-500/10 border border-green-500/20 text-green-400
                        {% else %}
                            bg-blue-500/10 border border-blue-500/20 text-blue-400
                        {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Formulario -->
            <form method="POST" action="{% url 'administracion:login' %}" class="space-y-5">
                {% csrf_token %}

                <!-- Usuario -->
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">
                        Usuario
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                        placeholder="nombre_de_usuario"
                        class="w-full px-4 py-2.5 rounded-lg text-sm text-slate-100 placeholder-slate-500
                               outline-none transition-all duration-200
                               border border-white/10 focus:border-indigo-500/50 focus:ring-2 focus:ring-indigo-500/20"
                        style="background-color: #1a1a24;"
                    >
                </div>

                <!-- Contraseña -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">
                        Contraseña
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                        placeholder="••••••••"
                        class="w-full px-4 py-2.5 rounded-lg text-sm text-slate-100 placeholder-slate-500
                               outline-none transition-all duration-200
                               border border-white/10 focus:border-indigo-500/50 focus:ring-2 focus:ring-indigo-500/20"
                        style="background-color: #1a1a24;"
                    >
                </div>

                <!-- Botón -->
                <button
                    type="submit"
                    class="w-full py-2.5 px-4 rounded-lg text-sm font-semibold text-white
                           bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
                           transition-colors duration-200 cursor-pointer
                           focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:ring-offset-2 focus:ring-offset-transparent">
                    Iniciar sesión
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-600 mt-6">
            NutriSync &copy; {% now "Y" %} · Panel exclusivo para administradores
        </p>
    </div>

</body>
</html>
