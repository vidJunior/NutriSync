{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-gray-100 py-10">
    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Mis Logros</h2>
        {% if logros %}
        <ul class="space-y-2">
            {% for l in logros %}
            <li class="border-b py-2">
                <span class="font-semibold">{{ l.logro.nombre }}</span>
                <span class="text-sm text-gray-500"> - {{ l.fecha_obtenido|date }}</span>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="text-gray-600">Aún no has desbloqueado logros.</p>
        {% endif %}
        <a href="{% url 'nutricion:dashboard' %}" class="text-green-600 hover:underline mt-4 inline-block">Volver</a>
    </div>
</div>
{% endblock %}
