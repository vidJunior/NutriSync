<!-- templates/components/modal.html -->
<!-- Modal reutilizable -->

<div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-5xl max-h-[95vh] flex flex-col
                transform transition-all duration-200 scale-95 opacity-0"
         id="modal-container">
        <!-- Encabezado fijo -->
        <div class="flex items-center justify-between px-6 py-4 bg-teal-600 rounded-t-2xl flex-shrink-0">
            <h2 id="modal-title" class="text-lg font-semibold text-white">Modal</h2>
            <button onclick="closeModal()"
                    class="text-white/80 hover:text-white hover:bg-teal-700 p-1.5 rounded-lg transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <!-- Contenido dinámico -->
        <div id="modal-content" class="p-6 overflow-y-auto flex-1">
            <div class="flex items-center justify-center py-12 text-slate-400">
                <i data-lucide="loader" class="w-6 h-6 animate-spin"></i>
                <span class="ml-2 text-sm">Cargando...</span>
            </div>
        </div>
    </div>
</div>
