<!-- templates/components/busqueda.html -->
<!-- Barra de búsqueda -->

<div class="relative flex-1 max-w-md">
    <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
    <input type="text" name="{{ name|default:'q' }}" value="{{ valor|default:'' }}"
           placeholder="{{ placeholder|default:'Buscar...' }}"
           class="w-full border border-slate-200 rounded-lg pl-10 pr-4 py-2 text-sm text-slate-800
                  focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent
                  placeholder-slate-300">
</div>
