<!-- templates/components/sidebar.html -->
<!-- Navegación lateral fija. Ancho 240px (w-60). -->
<!-- Se incluye desde base.html solo cuando el usuario está autenticado. -->

<aside id="sidebar"
    class="w-60 bg-slate-900 h-screen fixed inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 transition duration-200 flex flex-col z-20">

    <!-- Logo / Nombre del sistema -->
    <div class="px-6 py-5 border-b border-slate-800">
        <a href="{% url 'core:dashboard' %}" class="flex items-center gap-2 group">
            <i data-lucide="apple" class="w-6 h-6 text-teal-500"></i>
            <span
                class="text-white font-semibold text-lg tracking-tight group-hover:text-teal-400 transition-colors duration-200">
                NutriSync
            </span>
        </a>
        {% if perfil and perfil.especialidad %}
        <p class="text-slate-500 text-xs mt-1 truncate">{{ perfil.especialidad }}</p>
        {% endif %}
    </div>

    <!-- Navegación principal -->
    <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="{% url 'core:dashboard' %}"
            class="sidebar-link {% if request.resolver_match.namespace == 'core' and request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
        </a>

        <a href="{% url 'pacientes:lista' %}"
            class="sidebar-link {% if request.resolver_match.namespace and 'pacientes' in request.resolver_match.namespace %}active{% endif %}">
            <i data-lucide="users" class="w-5 h-5"></i> Pacientes
        </a>

        <a href="{% url 'agendas:agenda' %}"
            class="sidebar-link {% if request.resolver_match.namespace and 'agendas' in request.resolver_match.namespace %}active{% endif %}">
            <i data-lucide="calendar" class="w-5 h-5"></i> Agenda
        </a>

        <a href="{% url 'nutricion:alimentos' %}"
            class="sidebar-link {% if request.resolver_match.namespace and 'nutricion' in request.resolver_match.namespace and 'alimento' in request.resolver_match.url_name %}active{% endif %}">
            <i data-lucide="apple" class="w-5 h-5"></i> Alimentos
        </a>

        <a href="{% url 'nutricion:recetas' %}"
            class="sidebar-link {% if request.resolver_match.namespace and 'nutricion' in request.resolver_match.namespace and 'receta' in request.resolver_match.url_name %}active{% endif %}">
            <i data-lucide="chef-hat" class="w-5 h-5"></i> Recetas
        </a>

        <a href="{% url 'nutricion:planes' %}"
            class="sidebar-link {% if request.resolver_match.namespace and 'nutricion' in request.resolver_match.namespace and 'plan' in request.resolver_match.url_name %}active{% endif %}">
            <i data-lucide="utensils" class="w-5 h-5"></i> Planes
        </a>

        <a href="{% url 'seguimiento:dashboard' %}"
            class="sidebar-link {% if request.resolver_match.namespace == 'seguimiento' and request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i data-lucide="activity" class="w-5 h-5"></i> Seguimiento
        </a>

        <a href="{% url 'seguimiento:notas_dashboard' %}"
            class="sidebar-link {% if request.resolver_match.namespace == 'seguimiento' and request.resolver_match.url_name == 'notas_dashboard' %}active{% endif %}">
            <i data-lucide="clipboard-list" class="w-5 h-5"></i> Notas Clínicas
        </a>

        <a href="{% url 'reportes:dashboard' %}"
            class="sidebar-link {% if request.resolver_match.namespace == 'reportes' %}active{% endif %}">
            <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Reportes
        <a href="{% url 'facturacion:dashboard' %}"
            class="sidebar-link {% if request.resolver_match.namespace == 'facturacion' %}active{% endif %}">
            <i data-lucide="credit-card" class="w-5 h-5"></i> Facturación
        </a>
    </nav>

    <!-- Sección inferior: perfil y logout -->
    <div class="px-3 py-4 border-t border-slate-800 space-y-1">
        <a href="{% url 'core:soporte' %}"
            class="sidebar-link {% if request.resolver_match.url_name == 'soporte' %}active{% endif %}">
            <i data-lucide="life-buoy" class="w-5 h-5"></i> Soporte Técnico
        </a>
        <a href="{% url 'core:perfil' %}"
            class="sidebar-link {% if request.resolver_match.url_name == 'perfil' %}active{% endif %}">
            <i data-lucide="user" class="w-5 h-5"></i> Mi Perfil
        </a>
        <a href="{% url 'core:logout' %}" class="sidebar-link hover:text-red-400">
            <i data-lucide="log-out" class="w-5 h-5"></i> Cerrar Sesión
        </a>
    </div>
</aside>
