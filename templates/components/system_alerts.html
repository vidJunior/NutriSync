<!-- templates/components/system_alerts.html -->
<div class="space-y-3 {% if request.resolver_match.url_name == 'notificaciones' %}hidden{% endif %}" id="system-alerts-container" data-api-url="{% url 'core:api_alertas' %}">
    <!-- Alertas temporales -->
</div>

<script>
    // Evita repetir alertas conocidas.
    const knownAlertIds = new Set();
    let isFirstLoad = true;

    document.addEventListener("DOMContentLoaded", function() {
        // Inicializa alertas y contador.
        fetchSystemAlerts();
        
        // Consulta cada diez segundos.
        setInterval(fetchSystemAlerts, 10000);
    });

    function updateSidebarBadge(count) {
        let badge = document.getElementById('sidebar-alert-badge');
        const link = document.getElementById('sidebar-alert-link');
        if (count > 0) {
            if (!badge && link) {
                badge = document.createElement('span');
                badge.id = 'sidebar-alert-badge';
                badge.className = 'ml-auto w-5 h-5 bg-teal-500 text-white rounded-full flex items-center justify-center text-[10px] font-bold animate-pulse';
                link.appendChild(badge);
            }
            if (badge) {
                badge.textContent = count;
            }
        } else {
            if (badge) {
                badge.remove();
            }
        }
    }

    function dismissSystemAlert(id) {
        const el = document.getElementById(`alert-banner-${id}`);
        if (el) {
            el.classList.add('opacity-0', 'scale-95');
            setTimeout(() => el.remove(), 300);
            
            // Marcar como leído en backend
            const readUrl = `/api/alertas/${id}/leer/`;
            const csrfToken = document.cookie
                .split('; ')
                .find(row => row.startsWith('csrftoken='))
                ?.split('=')[1] || '';
            fetch(readUrl, {
                method: 'POST',
                headers: {'X-CSRFToken': decodeURIComponent(csrfToken)}
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        updateSidebarBadge(data.alertas_pendientes_count);
                    }
                })
                .catch(err => console.error("Error al marcar alerta como leída:", err));
        }
    }

    function fetchSystemAlerts() {
        const container = document.getElementById('system-alerts-container');
        if (!container) return;
        const apiUrl = container.getAttribute('data-api-url');
        if (!apiUrl) return;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success' && data.alertas !== undefined) {
                    // 1. Actualizar el contador de la barra lateral
                    updateSidebarBadge(data.alertas_pendientes_count);

                    // 2. Procesar alertas del servidor
                    data.alertas.forEach(alerta => {
                        // Registra las alertas iniciales sin mostrarlas.
                        if (isFirstLoad) {
                            knownAlertIds.add(alerta.id);
                            return;
                        }

                        // Omite alertas procesadas.
                        if (knownAlertIds.has(alerta.id)) {
                            return;
                        }

                        // Marca la alerta como procesada.
                        knownAlertIds.add(alerta.id);

                        // Muestra la alerta temporal.
                        const newAlert = document.createElement('div');
                        newAlert.id = `alert-banner-${alerta.id}`;
                        newAlert.setAttribute('data-alert-id', alerta.id);
                        newAlert.setAttribute('role', 'alert');
                        
                        let alertClasses = "system-alert-banner flex items-start justify-between gap-4 p-4 rounded-2xl border shadow-sm transition-all duration-500 opacity-0 transform -translate-y-4 scale-95 ";
                        let iconHtml = "";

                        if (alerta.tipo === 'info') {
                            alertClasses += "bg-sky-50/80 border-sky-200/60 text-sky-900";
                            iconHtml = `<div class="w-8 h-8 rounded-xl bg-sky-100 flex items-center justify-center text-sky-600"><i data-lucide="info" class="w-4 h-4"></i></div>`;
                        } else if (alerta.tipo === 'warning') {
                            alertClasses += "bg-amber-50/80 border-amber-200/60 text-amber-900";
                            iconHtml = `<div class="w-8 h-8 rounded-xl bg-amber-100 flex items-center justify-center text-amber-600"><i data-lucide="alert-triangle" class="w-4.5 h-4.5"></i></div>`;
                        } else if (alerta.tipo === 'critical' || alerta.tipo === 'error') {
                            alertClasses += "bg-rose-50/80 border-rose-200/60 text-rose-900";
                            iconHtml = `<div class="w-8 h-8 rounded-xl bg-rose-100 flex items-center justify-center text-rose-600"><i data-lucide="alert-circle" class="w-4.5 h-4.5"></i></div>`;
                        } else {
                            alertClasses += "bg-slate-50/80 border-slate-200/60 text-slate-900";
                            iconHtml = `<div class="w-8 h-8 rounded-xl bg-slate-100 flex items-center justify-center text-slate-650"><i data-lucide="bell" class="w-4 h-4"></i></div>`;
                        }

                        newAlert.className = alertClasses;

                        newAlert.innerHTML = `
                            <div class="flex gap-3">
                                <span class="flex-shrink-0 mt-0.5">
                                    ${iconHtml}
                                </span>
                                <div class="space-y-1">
                                    <h4 class="text-sm font-bold tracking-tight">${alerta.titulo}</h4>
                                    <p class="text-xs opacity-90 leading-relaxed">${alerta.mensaje.replace(/\n/g, '<br>')}</p>
                                    <p class="text-[10px] opacity-75 mt-2 flex items-center gap-1">
                                        <i data-lucide="clock" class="w-3 h-3"></i>
                                        ${alerta.fecha_creacion} · Comunicación Oficial de la Plataforma
                                    </p>
                                </div>
                            </div>
                            <button onclick="dismissSystemAlert(${alerta.id})" class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-xl hover:bg-slate-200/50 flex-shrink-0">
                                    <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        `;

                        // Inyectar al contenedor
                        container.insertBefore(newAlert, container.firstChild);
                        container.classList.add('mb-6');
                        
                        // Renderizar icono de Lucide
                        if (window.lucide) {
                            window.lucide.createIcons();
                        }

                        // Animación de entrada
                        setTimeout(() => {
                            newAlert.classList.remove('opacity-0', '-translate-y-4', 'scale-95');
                            newAlert.classList.add('opacity-100', 'translate-y-0', 'scale-100');
                        }, 50);

                        // Oculta la alerta a los siete segundos.
                        setTimeout(() => {
                            dismissSystemAlert(alerta.id);
                        }, 7000);
                    });

                    // Terminar estado de carga inicial
                    isFirstLoad = false;
                }
            })
            .catch(err => console.error("Error al obtener alertas del sistema:", err));
    }
</script>
