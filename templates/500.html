{% load static %}
<!-- templates/500.html -->
<!-- Error 500 -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Error del servidor · NutriSync</title>
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>

<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center">
    <div class="text-center max-w-md px-4">
        <p class="text-8xl font-bold text-slate-200 mb-4">500</p>
        <h1 class="text-2xl font-semibold text-slate-800 mb-2">Error del servidor</h1>
        <p class="text-slate-500 text-sm mb-8">
            Ocurrió un error inesperado. El equipo ya fue notificado. Intenta recargar la página.
        </p>
        <a href="/" class="bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg px-6 py-2.5 text-sm
                  transition-all duration-200 inline-block shadow-sm hover:shadow-md">
            Volver al Dashboard
        </a>
    </div>
</body>

</html>
